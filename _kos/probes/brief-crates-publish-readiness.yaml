id: brief-crates-publish-readiness
type: brief
confidence: frontier
title: "What needs to change in tmux-cmc before publishing to crates.io?"
content: |
  ## Question

  What architectural, security, documentation, packaging, and community
  standards changes are needed before tmux-cmc can be published to
  crates.io as a quality Rust ecosystem crate?

  ## Approach

  1. Architectural review — public API surface, error types, thread
     safety, resource cleanup, type design, ergonomics
  2. Security review — command injection, process spawning, FD handling,
     signal handling, DoS vectors
  3. Rust community standards research — API guidelines, publishing
     requirements, quality signals, common gotchas
  4. Documentation audit — rustdoc, examples, README, provenance
     (why tmux-cmc exists, link to forestage/marvel)
  5. Packaging — what to include/exclude from .crate file
  6. Unknown unknowns — what don't we know about publishing

  Context: aclaude is being renamed to forestage. References in
  tmux-cmc docs need updating.

  ## Excluded scope

  - Actually running cargo publish (this probe produces the checklist)
  - Async feature flag implementation (separate question)
  - Marketing/outreach (This Week in Rust, etc.) — post-publish
