id: question-notification-coverage
type: question
confidence: frontier
title: "Which unhandled notification types matter to actual consumers?"
content: |
  tmux-cmc handles 7 notification types; tmux emits 14+ more, all caught
  by Notification::Unhandled { raw }. No data is lost, but structured
  access requires parsing raw strings.

  Key constraint: aclaude's primary consumer runs Claude Code inside the
  pane. Claude Code owns the terminal rendering — aclaude does NOT read
  pane output (%output) and does NOT need most lifecycle notifications
  because the pane's content is not aclaude's concern.

  What aclaude actually uses from the notification stream:
  - PaneExited: potentially (see question-aclaude-pane-lifecycle)
  - Everything else: not needed for the current use case

  Unhandled types that might matter if the consumer set grows:
  - %session-created, %session-closed: useful if a future consumer tracks
    session lifecycle without creating the sessions itself
  - %window-renamed: display purposes
  - %layout-change: if a future consumer reacts to pane size changes
  - %client-detached: if aclaude wants to know when a user detaches

  Unhandled types that are unlikely to matter:
  - %pane-mode-changed, %pause: internal tmux state, not consumer-relevant
  - %client-session-changed, %session-window-changed: internal routing
  - %unlinked-window-*: edge cases in multi-session setups

  The enum is #[non_exhaustive] — adding variants is additive and non-breaking.
  Coverage should be driven by concrete consumer needs, not exhaustiveness.

  Probe question: before adding any notification variant, identify which
  consumer needs it and why. "It exists in the protocol" is not sufficient
  justification for structured handling.

