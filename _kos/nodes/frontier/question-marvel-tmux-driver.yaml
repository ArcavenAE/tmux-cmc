id: question-marvel-tmux-driver
type: question
confidence: frontier
title: "Is marvel's subprocess tmux driver sufficient, or does Go need a control mode client?"
content: |
  marvel (Go) manages agent sessions via tmux. Its current driver in
  internal/tmux/ shells out to the tmux CLI — one subprocess per command.
  tmux-cmc is Rust-only and is not applicable here.

  The question is whether the subprocess driver is adequate for marvel's
  actual fleet management requirements, or whether a Go control mode
  client is worth building or adopting.

  The case for keeping the subprocess driver:
  - Session starts/stops are infrequent operations. Even at 50 agents,
    the frequency of tmux commands doesn't stress the per-process model.
  - Agent communication (task routing) goes via director protocol (FIFO,
    named pipes) — not high-frequency tmux send-keys.
  - Pane exit detection: `tmux list-panes -F '#{pane_dead}'` polled at
    2-5s is adequate for restart policy. Sub-second detection is not
    required for the health check use case.

  The case for a Go control mode client:
  - Real-time PaneExited notification (no polling lag)
  - Reduces tmux subprocess spawn overhead at scale
  - Enables streaming %output capture without polling capture-pane
  - Only matters if fleet grows to 100+ agents or restart policy SLA is tight

  A Go control mode client would be a separate project, not an extension
  of tmux-cmc. Existing Go tmux libraries (if any) should be evaluated
  before building.

  Note: Go FFI to tmux-cmc (cgo) is explicitly ruled out — the build
  complexity and C ABI boundary are not worth it when the use case can
  be served by a pure Go implementation or the existing subprocess driver.

