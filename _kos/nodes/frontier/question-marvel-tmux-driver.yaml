id: question-marvel-tmux-driver
type: question
confidence: frontier
title: "Does marvel need tmux-cmc, or does Go keep its own tmux driver?"
content: |
  marvel (Go) has its own tmux driver in `internal/tmux/` that shells
  out to the tmux CLI. This works but has the same per-command subprocess
  overhead that motivated building tmux-cmc.

  Three options:
  1. **Go FFI to tmux-cmc** — call the Rust crate from Go via cgo.
     Preserves a single implementation. Adds a C ABI boundary and
     build-time dependency on the Rust toolchain in Go CI.
  2. **Port tmux-cmc to Go** — reimplement the control mode protocol
     in Go, separate crate/package, same design. Duplication but no
     FFI boundary. This is the "a little copying is better than a
     little dependency" path.
  3. **Keep Go's subprocess driver** — marvel's requirements may not
     need the real-time notification stream or zero-subprocess-overhead
     that tmux-cmc provides. The Go driver is already working. If
     it ain't broke, don't fix it.

  The case for keeping separate implementations: tmux-cmc was built
  because aclaude is Rust and needs the statusline push. marvel's
  tmux interactions are mostly create/list/kill sessions — not a
  high-frequency path. A Go port is only worth doing if marvel needs
  the notification stream for pane lifecycle events.

  Questions:
  - Does marvel need real-time pane exit notifications
    (Notification::PaneExited) for session health tracking?
  - Is the existing Go subprocess overhead measurable in practice?
  - Is there a simpler Go tmux control mode client to depend on vs
    building one?

