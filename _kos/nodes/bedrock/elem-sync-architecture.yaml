id: elem-sync-architecture
type: element
confidence: bedrock
title: "Sync threading model — no tokio, no async runtime"
content: |
  The crate is intentionally synchronous. No tokio, no async/await.
  Architecture: writer thread (mpsc → tmux stdin) + reader thread
  (stdout → PendingQueue + notification broadcast) + caller threads
  that block on `oneshot::Receiver::recv_timeout()`.

  `Client` is `Clone` via `Arc<Connection>`. Share freely across threads.
  Notification subscription: `client.notifications()` returns a
  `std::sync::mpsc::Receiver<Notification>`.

  Decision rationale: forestage is entirely synchronous. Adding an async
  runtime for a single I/O surface is unnecessary complexity. An `async`
  feature flag (tokio wrapper around the sync API) is deferred post-MVP.

